<script>
/* Service worker registration + update prompts.
 *  - Code change : the browser finds a new sw.js -> "new version" banner.
 *  - Data change : on a timer / tab-focus the page asks the SW to diff the
 *    cached CORE_ASSETS against the server by ETag; the SW posts DATA_CHANGED
 *    -> "content updated" banner.
 * The reload button always activates a waiting worker first (if one exists),
 * so a simultaneous sw.js change is picked up by the same reload. */
(function () {
  if (!("serviceWorker" in navigator)) return;
  var swReg = null, updating = false;

  navigator.serviceWorker.addEventListener("controllerchange", function () {
    console.log("[page] controllerchange event, updating flag =", updating);
    if (!updating) return;            // ignore first-install claim; reload only after opt-in
    updating = false;
    console.log("[page] controllerchange: reloading (opted in via SKIP_WAITING)");
    location.reload();
  });
  // Durable (localStorage, not SW memory) record of {url: lastNotifiedTag}.
  // The SW is stateless and reports every current diff on every check; it's
  // the page's job to only surface a banner for tags it hasn't shown before,
  // since an idle SW can be silently killed and restarted by the browser
  // between checks (routine, and much more frequent than the 30-min/tab-focus
  // check interval) — an in-memory dedup on the SW side would get wiped right
  // along with it and re-show the same already-seen change forever.
  var NOTIFIED_KEY = "sw-notified-tags";
  function readNotifiedTags() { try { return JSON.parse(localStorage.getItem(NOTIFIED_KEY) || "{}"); } catch (e) { return {}; } }
  function writeNotifiedTags(obj) { try { localStorage.setItem(NOTIFIED_KEY, JSON.stringify(obj)); } catch (e) {} }

  navigator.serviceWorker.addEventListener("message", function (e) {
    console.log("[page] message from SW:", e.data);
    if (!e.data || e.data.type !== "DATA_CHANGED") return;
    var files = e.data.files || [];
    var known = readNotifiedTags();
    var fresh = files.filter(function (f) { return known[f.url] !== f.tag; });
    console.log("[page] DATA_CHANGED: received", files.length, "| already notified (skip):", files.length - fresh.length, "| fresh:", fresh);
    if (!fresh.length) return;
    fresh.forEach(function (f) { known[f.url] = f.tag; });
    writeNotifiedTags(known);
    showBar("内容已更新 · Content updated", "DATA_CHANGED (new): " + JSON.stringify(fresh.map(function (f) { return f.url; })));
  });

  function showBar(label, reason) {
    if (document.getElementById("sw-update-bar")) { console.log("[page] showBar: already showing, skip. reason =", reason); return; }
    console.log("[page] showBar:", label, "| reason:", reason);
    var bar = document.createElement("div");
    bar.id = "sw-update-bar";
    bar.setAttribute("style", "position:fixed;left:0;right:0;bottom:0;z-index:99999;display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;padding:10px 16px;background:#2b2520;color:#fdf6e9;font:14px/1.4 system-ui,-apple-system,sans-serif;box-shadow:0 -2px 12px rgba(0,0,0,.25)");
    var msg = document.createElement("span"); msg.textContent = label;
    var btn = document.createElement("button"); btn.textContent = "刷新 / Reload";
    btn.setAttribute("style", "border:0;border-radius:999px;padding:6px 16px;cursor:pointer;background:#f0a868;color:#2b2520;font:600 14px system-ui,sans-serif");
    btn.onclick = function () {
      btn.disabled = true; btn.textContent = "…";
      console.log("[page] Reload clicked. swReg.waiting =", !!(swReg && swReg.waiting));
      if (swReg && swReg.waiting) { updating = true; swReg.waiting.postMessage({ type: "SKIP_WAITING" }); }
      else { location.reload(); }
    };
    var x = document.createElement("button"); x.textContent = "✕"; x.title = "稍后";
    x.setAttribute("style", "border:0;background:transparent;color:#fdf6e9;cursor:pointer;font-size:16px;opacity:.7");
    x.onclick = function () { console.log("[page] banner dismissed by user"); bar.remove(); };
    bar.appendChild(msg); bar.appendChild(btn); bar.appendChild(x);
    document.body.appendChild(bar);
  }

  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").then(function (reg) {
      swReg = reg;
      console.log("[page] SW registered. reg.waiting =", !!reg.waiting, "| controller =", !!navigator.serviceWorker.controller);
      if (reg.waiting && navigator.serviceWorker.controller) showBar("发现新版本 · New version available", "reg.waiting already set on register");
      reg.addEventListener("updatefound", function () {
        console.log("[page] updatefound event");
        var nw = reg.installing; if (!nw) return;
        nw.addEventListener("statechange", function () {
          console.log("[page] installing worker statechange:", nw.state);
          if (nw.state === "installed" && navigator.serviceWorker.controller) showBar("发现新版本 · New version available", "installing worker reached 'installed'");
        });
      });
      var check = function (why) {
        console.log("[page] check() triggered by:", why, "| reg.waiting =", !!reg.waiting, "| controller =", !!navigator.serviceWorker.controller);
        reg.update().catch(function (err) { console.log("[page] reg.update() failed:", err && err.message); });   // code / sw.js change
        if (navigator.serviceWorker.controller) {
          console.log("[page] posting CHECK_UPDATES to controller");
          navigator.serviceWorker.controller.postMessage({ type: "CHECK_UPDATES" }); // data change
        }
      };
      setInterval(function () { check("30-min timer"); }, 30 * 60 * 1000);
      document.addEventListener("visibilitychange", function () { if (document.visibilityState === "visible") check("tab-focus"); });
    }).catch(function (err) { console.log("[page] SW registration failed:", err && err.message); });
  });
})();
</script>
<style>
  :root{
    --bg:#fbf6ec; --card:#fffdf8; --ink:#2b2520; --muted:#8a7f70;
    --line:#e7ddc9; --accent:#b5651d; --accent2:#0b7285;
    --mark:#d9480f; --value:#0b7285; --good:#2f9e44; --ring:#f0a868;
    --shadow:0 1px 3px rgba(80,60,30,.10),0 6px 18px rgba(80,60,30,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
    -webkit-text-size-adjust:100%; line-height:1.5;
  }
  .wrap{max-width:920px;margin:0 auto;padding:18px 16px 60px}
  a{color:var(--accent)}
  button{font-family:inherit}
  .btn{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:999px; padding:8px 16px; font-size:15px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px; box-shadow:var(--shadow);
  }
  .btn:hover{border-color:var(--ring)}
  .btn.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .icon-btn{font-size:20px; line-height:1; padding:9px 12px}

  /* ---------- Index ---------- */
  .app-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:6px 0 18px}
  .app-head h1{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:30px;margin:0;letter-spacing:2px}
  .app-head .sub{color:var(--muted);font-size:14px}
  .overall{margin-left:auto;color:var(--muted);font-size:13px}
  .empty-state{text-align:center;color:var(--muted);font-size:14px;padding:60px 20px}

  .searchbar{display:flex;align-items:center;gap:8px;margin:0 0 18px;flex-wrap:wrap}
  .search-input{flex:1 1 240px;min-width:0;border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:15px;background:var(--card);color:inherit;font-family:inherit}
  .search-input:focus{outline:none;border-color:var(--ring)}
  .search-input::-webkit-search-cancel-button{cursor:pointer}
  .search-msg{color:var(--accent2);font-size:13px}
  .search-hint{color:var(--muted);font-size:13px;margin:0 0 8px}

  .grade{margin:0 0 26px}
  .grade-head{display:flex;align-items:center;gap:12px;margin:0 0 10px}
  .grade-head h2{font-size:19px;margin:0;font-weight:700}
  .grade-head .count{color:var(--muted);font-size:13px;white-space:nowrap}
  .bar{flex:1;height:9px;background:var(--line);border-radius:999px;overflow:hidden;min-width:80px;max-width:340px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#7bbf6a,#2f9e44);width:0;transition:width .4s ease}
  .vol{color:var(--muted);font-size:12px;margin:12px 0 6px;letter-spacing:1px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .pcard{
    position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 13px 11px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s,border-color .12s;
    min-height:74px;display:flex;flex-direction:column;justify-content:space-between
  }
  .pcard:hover{transform:translateY(-2px);border-color:var(--ring)}
  .pcard .t{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:20px;font-weight:700;letter-spacing:1px}
  .pcard .a{color:var(--muted);font-size:12.5px;margin-top:4px}
  .pcard .seen{position:absolute;top:9px;right:10px;color:var(--good);font-size:14px;opacity:0}
  .pcard.viewed .seen{opacity:1}
  .pcard.focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,168,104,.5),var(--shadow);animation:pulse 1.6s ease 2}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(240,168,104,.25),var(--shadow)}50%{box-shadow:0 0 0 5px rgba(240,168,104,.6),var(--shadow)}}

  /* ---------- Poem ---------- */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 0 14px}
  .toolbar .spacer{flex:1}
  .poem-card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px 20px}
  .ptitle{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:30px;font-weight:700;text-align:center;letter-spacing:2px;margin:2px 0 2px}
  .ptitle-py{text-align:center;color:var(--muted);font-size:14px;letter-spacing:1px;margin-bottom:4px;display:none}
  body.pinyin .ptitle-py{display:block}
  .pauthor{text-align:center;color:var(--muted);font-size:14px;margin-bottom:6px}
  .pcats{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:0 0 8px}
  .pchip{display:inline-flex;align-items:center;height:26px;box-sizing:border-box;font-size:12px;line-height:1;padding:0 11px;border-radius:999px;border:1px solid var(--line);background:var(--bg);color:var(--accent2);cursor:pointer;white-space:nowrap}
  .pchip:hover{border-color:var(--accent2);background:rgba(11,114,133,.08)}
  .pchip.grade{color:var(--accent)}
  .pchip.grade:hover{border-color:var(--accent);background:rgba(181,101,29,.08)}
  .pchip .pchip-en{color:var(--muted);margin-left:4px;font-size:11px}
  .media{display:flex;gap:10px;justify-content:center;margin:8px 0 4px;min-height:4px}

  .body{margin:20px auto 6px;max-width:100%;overflow-x:auto}
  .line-wrap{display:flex;justify-content:center}
  .line-inner{position:relative}
  .poem-line{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:2px 4px;padding:5px 0}
  .char{display:inline-flex;flex-direction:column;align-items:center;justify-content:flex-end}
  .char .py{font-size:0;height:0;color:var(--muted);transition:none;white-space:nowrap;font-variant:none}
  body.pinyin .char .py{font-size:14px;height:1.35em;line-height:1.35em;margin-bottom:1px}
  .char .hz{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:30px;line-height:1.25}
  .punct{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:30px;line-height:1.25;align-self:flex-end;color:#9c917f}
  .char[title]{cursor:help}
  .rbadges{position:absolute;left:100%;top:0;bottom:0;margin-left:8px;display:flex;flex-direction:row;align-items:center;gap:3px}
  .rbadge{font-family:system-ui,sans-serif;font-size:11px;line-height:1.4;color:var(--accent2);border:1px solid var(--accent2);border-radius:8px;padding:1px 6px;white-space:nowrap;cursor:help;opacity:.55;transition:opacity .15s}
  .rbadge:hover{opacity:1}
  /* sandhi (only meaningful when pinyin shown) */
  body.pinyin .py.s-mark{color:var(--mark);font-weight:700}
  body.pinyin .py.s-value{color:var(--value);border-bottom:2px dotted var(--value)}
  body.pinyin .char:has(.s-mark) .hz{box-shadow:inset 0 -10px 0 rgba(217,72,15,.13)}
  body.pinyin .char:has(.s-value) .hz{box-shadow:inset 0 -10px 0 rgba(11,114,133,.10)}

  .legend{display:none;gap:16px;justify-content:center;flex-wrap:wrap;color:var(--muted);font-size:12.5px;margin:6px 0 0}
  body.pinyin .legend{display:flex}
  .legend b{font-weight:700}
  .legend .m{color:var(--mark)} .legend .v{color:var(--value)}

  .section{margin:22px auto 0;max-width:760px}
  .section h3{font-size:15px;margin:0 0 8px;color:var(--accent);letter-spacing:1px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .trans .tl{display:flex;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line);flex-wrap:wrap}
  .trans .tl:last-child{border-bottom:0}
  .trans .src{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:17px;min-width:7em;flex:1 1 8em}
  .trans .zh{flex:2 1 12em;color:#4a4337;font-size:14px}
  .trans .en{flex:2 1 12em;color:var(--muted);font-size:13px;font-style:italic}
  .note{margin:0 0 12px}
  .note .lab{font-weight:700;font-size:13.5px;color:#5a5042}
  .note .zh{font-size:14.5px;margin:2px 0}
  .note .en{font-size:13px;color:var(--muted)}
  details.glossary{margin-top:6px}
  details.glossary summary{cursor:pointer;color:var(--accent);font-size:14px}
  .gloss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px 14px;margin-top:10px}
  .gloss-grid .g{font-size:13.5px;border-bottom:1px dotted var(--line);padding-bottom:4px}
  .gloss-grid .g b{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:17px;margin-right:5px}
  .gloss-grid .g .gp{color:var(--accent2);margin-right:6px}
  .gloss-grid .g .ge{color:var(--muted)}

  .hint{color:var(--muted);font-size:12.5px}
  /* import */
  .import{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:24px;text-align:center;box-shadow:var(--shadow)}
  .import p{color:var(--muted);font-size:14px}

  /* video modal */
  .modal{position:fixed;inset:0;background:rgba(20,15,8,.72);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}
  .modal .box{background:#000;border-radius:14px;overflow:hidden;width:min(900px,100%);max-height:90vh;position:relative}
  .modal .vwrap{position:relative;width:100%;aspect-ratio:16/9;background:#000}
  .modal iframe,.modal video{position:absolute;inset:0;width:100%;height:100%;border:0}
  .modal .x{position:absolute;top:8px;right:10px;z-index:2}
  .modal .open-ext{position:absolute;bottom:8px;left:12px;z-index:2;color:#fff;font-size:13px}
  /* custom tooltip (fast, readable) */
  #tip{position:fixed;z-index:80;max-width:300px;background:#2b2520;color:#fdf6e9;padding:9px 12px;border-radius:10px;font-size:15px;line-height:1.5;white-space:pre-line;box-shadow:0 8px 26px rgba(0,0,0,.32);pointer-events:none;display:none}
  /* media icons on index cards */
  .cardmedia{display:flex;gap:6px;margin-top:9px}
  .icon-btn.mini{padding:5px 9px;font-size:15px;box-shadow:none}
  /* credits + license footer */
  .credits{margin:30px 0 0}
  .credits h3{font-size:15px;color:var(--accent);letter-spacing:1px;border-bottom:1px solid var(--line);padding-bottom:5px;margin:0 0 10px}
  .credit-list{display:flex;flex-direction:column;gap:6px}
  .credit{font-size:14px}
  .credit .cn{color:var(--muted)}
  .footer{max-width:760px;margin:36px auto 10px;padding-top:16px;border-top:1px solid var(--line);font-size:12px;line-height:1.7;color:var(--muted);text-align:center}
  .footer a{color:var(--accent)}
  /* view toggle */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card)}
  .seg-btn{border:0;background:transparent;color:var(--muted);font:14px system-ui,sans-serif;padding:6px 14px;cursor:pointer}
  .seg-btn.on{background:var(--accent);color:#fff}
  /* category (theme) view */
  .cat-group{margin:18px 0 6px;font-size:13px;letter-spacing:2px;color:var(--accent2);font-weight:700}
  .cat-block{border:1px solid var(--line);border-radius:14px;background:var(--card);box-shadow:var(--shadow);margin:0 0 10px;overflow:hidden}
  .cat-head{padding:12px 18px;cursor:pointer}
  .cat-head:hover{background:rgba(240,168,104,.08)}
  .cat-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .cat-head .chev{color:var(--accent);font-size:12px;width:1em;flex:0 0 auto}
  .cat-head .clabel{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:19px;font-weight:700}
  .cat-head .clabel .cen{font-family:system-ui,sans-serif;font-size:12px;font-weight:400;color:var(--muted);letter-spacing:1px}
  .cat-head .ccount{background:var(--line);color:#6f6757;border-radius:999px;padding:1px 9px;font-size:12px}
  .cat-head .cdesc{color:var(--muted);font-size:12.5px;margin:4px 0 0 1.7em}
  .cat-head .cexample{color:var(--accent2);font-size:12.5px;font-style:italic;margin:4px 0 0 1.7em}
  .cat-head .cexample .exen{color:var(--muted);font-style:normal}
  .cat-body{padding:0 20px 4px}
  .cat-body.open{padding:6px 20px 18px}
  .cat-list{display:flex;flex-direction:column}
  .cat-row{display:flex;gap:16px;align-items:baseline;padding:8px 6px;border-top:1px dashed var(--line);cursor:pointer}
  .cat-row:hover{color:var(--accent)}
  .cat-row .rt{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:16px;font-weight:700;flex:0 0 14em;line-height:1.3}
  .cat-row .ra{flex:0 0 5em;color:var(--muted);font-size:12.5px;white-space:nowrap}
  .cat-row .rl{flex:1 1 0;min-width:0;color:#8d8273;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat-row .rv{flex:0 0 auto;color:var(--good);font-size:12px}
  .cmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;padding-top:6px}
  .cmp-card{position:relative;border:1px solid var(--line);border-radius:12px;padding:14px 12px;background:var(--bg);cursor:pointer;text-align:center;transition:transform .12s,border-color .12s}
  .cmp-card:hover{transform:translateY(-2px);border-color:var(--ring)}
  .cmp-card .ct{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:19px;font-weight:700;letter-spacing:1px}
  .cmp-card .ca{color:var(--muted);font-size:12px;margin:2px 0 8px}
  .cmp-card .cmp-text{font-family:"Kaiti SC","STKaiti","KaiTi","楷体",serif;font-size:16px;line-height:1.75}
  .cmp-card .seen{position:absolute;top:6px;right:9px;color:var(--good);font-size:12px;opacity:0}
  .cmp-card.viewed .seen{opacity:1}
  @media(max-width:520px){
    .ptitle{font-size:26px}.char .hz,.punct{font-size:26px}
    .pcard .t{font-size:18px}
    .cat-row{flex-wrap:wrap}
    .cat-row .rt{flex-basis:auto}
    .cat-row .rl{flex-basis:100%}
  }
</style>
</head>

<div class="wrap" id="root"></div>
<audio id="audio" preload="none"></audio>

<script>
"use strict";
/* ============================ state ============================ */
const DATA_KEY="poems.data.v3", VIEW_KEY="poems.viewed.v1", PREF_KEY="poems.pinyin.v1", VIEWMODE_KEY="poems.view.v1";
const GRADE_LABEL={1:"一年级",2:"二年级",3:"三年级",4:"四年级",5:"五年级",6:"六年级"};
const VOL_LABEL={"上":"上册","下":"下册"};

let GRADES=[];          // [{grade, poems:[...]}]
let BYID={};            // id -> poem (poem carries its grade)
let ORDER=[];           // ids in display order
let MEDIA={};           // id -> {audio,audioStart,video,videoStart}
let CREDITS=[];         // [{name,url,note}] external media credits
let CATEGORIES=[];      // [{key,zh,en,group,desc_zh,desc_en,count}]
let RHETORIC=[];        // [{key,zh,en,desc_zh,desc_en}] rhetorical devices
let viewed=loadViewed();
let showPinyin=localStorage.getItem(PREF_KEY)==="1";
let indexMode=localStorage.getItem(VIEWMODE_KEY)||"grades";  // "grades" | "themes" | "rhetoric" | "read"
const expandedCats=new Set();
const expandedRhet=new Set();

const root=document.getElementById("root");
const audioEl=document.getElementById("audio");
let activeAudioId=null;

/* ============================ storage ============================ */
function loadViewed(){ try{return new Set(JSON.parse(localStorage.getItem(VIEW_KEY)||"[]"));}catch(e){return new Set();} }
function saveViewed(){ try{localStorage.setItem(VIEW_KEY,JSON.stringify([...viewed]));}catch(e){} }
function cacheData(grades,media,cats,rhet){ try{localStorage.setItem(DATA_KEY,JSON.stringify({grades,media,cats,rhet}));}catch(e){} }
function readCache(){ try{return JSON.parse(localStorage.getItem(DATA_KEY)||"null");}catch(e){return null;} }
function resetData(){ try{localStorage.removeItem(DATA_KEY);}catch(e){} location.reload(); }

function setData(grades,media,cats,rhet){
  GRADES=grades.slice().sort((a,b)=>a.grade-b.grade);
  BYID={}; ORDER=[]; MEDIA={};
  for(const g of GRADES) for(const p of g.poems){ p.grade=g.grade; BYID[p.id]=p; ORDER.push(p.id); }
  if(media) for(const k in media){ if(k[0]==="_") continue; const m=media[k]; if(m&&(m.audio||m.video)) MEDIA[k]=m; }
  CREDITS = (media && Array.isArray(media._credits)) ? media._credits : [];
  CATEGORIES = Array.isArray(cats) ? cats : [];
  RHETORIC = Array.isArray(rhet) ? rhet : [];
}

/* ============================ load ============================ */
async function loadData(){
  try{
    const arr=await Promise.all([1,2,3,4,5,6].map(g=>
      fetch("poems/poems-g"+g+".json",{cache:"reload"}).then(r=>{if(!r.ok)throw new Error("http "+r.status);return r.json();})
    ));
    let media={};
    try{ const mr=await fetch("poems/poems-media.json",{cache:"reload"}); if(mr.ok) media=await mr.json(); }catch(e){}
    let cats=[];
    try{ const cr=await fetch("poems/categories.json",{cache:"reload"}); if(cr.ok){ const cj=await cr.json(); cats=cj.categories||[]; } }catch(e){}
    let rhet=[];
    try{ const rr=await fetch("poems/rhetoric.json",{cache:"reload"}); if(rr.ok){ const rj=await rr.json(); rhet=rj.devices||[]; } }catch(e){}
    const grades=arr.map(d=>({grade:d.meta.grade, poems:d.poems}));
    setData(grades,media,cats,rhet); cacheData(grades,media,cats,rhet); return true;
  }catch(e){
    const cached=readCache();
    if(cached&&cached.grades){ setData(cached.grades,cached.media||{},cached.cats||[],cached.rhet||[]); return true; }
    return false;
  }
}

/* ============================ search (text + voice) ============================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
let searchQuery="";
let voiceRecognizer=null, voiceListening=false;

const stripPunctChars=/[，,。.？?！!、；;：:""''""''《》〈〉…—\-\s]/g;
function normalizeZh(s){ return (s||"").replace(stripPunctChars,""); }

function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(!m) return n; if(!n) return m;
  const dp=new Array(n+1);
  for(let j=0;j<=n;j++) dp[j]=j;
  for(let i=1;i<=m;i++){
    let prev=dp[0]; dp[0]=i;
    for(let j=1;j<=n;j++){
      const tmp=dp[j];
      dp[j]= a[i-1]===b[j-1] ? prev : 1+Math.min(prev,dp[j],dp[j-1]);
      prev=tmp;
    }
  }
  return dp[n];
}
function textSimilarity(a,b){
  if(!a.length && !b.length) return 1;
  if(!a.length || !b.length) return 0;
  return 1-levenshtein(a,b)/Math.max(a.length,b.length);
}
/* Best match for one poem: checks title, author, and every line; substring hits score
   highest (weighted by how much of the longer string the match covers), otherwise falls
   back to whole-string edit-distance similarity (tolerant of speech-recognition slips). */
function bestMatchForPoem(query,poem){
  let best={score:0,line:null};
  const consider=(text,weight)=>{
    if(!text) return;
    let s;
    if(text.includes(query) || query.includes(text)){
      s=0.92 + (Math.min(text.length,query.length)/Math.max(text.length,query.length))*0.08;
    }else{
      s=textSimilarity(query,text);
    }
    s*=weight;
    if(s>best.score) best={score:s,line:text};
  };
  consider(normalizeZh(poem.title),0.97);
  consider(normalizeZh(poem.author),0.6);
  for(const ln of poem.lines) consider(normalizeZh(ln.text),1);
  return best;
}

function buildSearchBar(){
  const bar=el("div","searchbar");
  const input=el("input","search-input");
  input.type="search";
  input.autocomplete="off";
  input.placeholder="输入或说出一句诗，查一查是哪首…";
  input.value=searchQuery;
  input.oninput=()=>{ searchQuery=input.value; updateSearchResults(); };
  bar.appendChild(input);
  if(searchQuery){
    const clear=el("button","btn icon-btn"); clear.type="button"; clear.textContent="✕"; clear.title="清除搜索";
    clear.onclick=()=>{ searchQuery=""; input.value=""; updateSearchResults(); input.focus(); };
    bar.appendChild(clear);
  }
  if(SR){
    const mic=el("button","btn icon-btn"); mic.type="button"; mic.textContent="🎤";
    mic.title="语音搜索（说出一句诗）";
    mic.onclick=()=>toggleVoiceSearch(mic);
    bar.appendChild(mic);
  }
  bar.appendChild(el("span","search-msg"));
  return bar;
}

function showSearchMessage(msg){
  const m=document.querySelector(".searchbar .search-msg"); if(!m) return;
  m.textContent=msg;
  clearTimeout(showSearchMessage._t);
  showSearchMessage._t=setTimeout(()=>{ m.textContent=""; },3000);
}

function toggleVoiceSearch(mic){
  if(!SR) return;
  if(voiceListening){ voiceRecognizer&&voiceRecognizer.stop(); return; }
  try{
    voiceRecognizer=new SR();
    voiceRecognizer.lang="zh-CN";
    voiceRecognizer.interimResults=false;
    voiceRecognizer.maxAlternatives=1;
    voiceListening=true;
    mic.textContent="⏹"; mic.classList.add("on"); mic.title="正在聆听…点击停止";
    voiceRecognizer.onresult=(e)=>{
      searchQuery=e.results[0][0].transcript;
      voiceListening=false;
      renderIndex();
    };
    voiceRecognizer.onerror=(e)=>{
      voiceListening=false; mic.textContent="🎤"; mic.classList.remove("on"); mic.title="语音搜索（说出一句诗）";
      const msg = e.error==="not-allowed" ? "麦克风权限被拒绝" : e.error==="no-speech" ? "没有听到声音，请再试一次" : "语音识别出错，请重试";
      showSearchMessage(msg);
    };
    voiceRecognizer.onend=()=>{
      voiceListening=false;
      if(mic.isConnected){ mic.textContent="🎤"; mic.classList.remove("on"); }
    };
    voiceRecognizer.start();
  }catch(e){ voiceListening=false; showSearchMessage("此浏览器不支持语音识别"); }
}

function updateSearchResults(){
  const normalWrap=document.getElementById("normalContent");
  const resultsWrap=document.getElementById("searchResults");
  if(!normalWrap || !resultsWrap) return;
  const q=normalizeZh(searchQuery);
  resultsWrap.innerHTML="";
  if(!q){
    normalWrap.style.display="";
    resultsWrap.style.display="none";
    return;
  }
  normalWrap.style.display="none";
  resultsWrap.style.display="";
  const matches=ORDER.map(id=>BYID[id])
    .map(p=>({poem:p, ...bestMatchForPoem(q,p)}))
    .filter(m=>m.score>=0.45)
    .sort((a,b)=>b.score-a.score)
    .slice(0,12);
  resultsWrap.appendChild(el("div","search-hint",matches.length?`找到 ${matches.length} 个可能的结果：`:""));
  if(!matches.length){
    resultsWrap.appendChild(el("div","empty-state","没有找到匹配的诗句，换个说法再试试？"));
    return;
  }
  const list=el("div","cat-list");
  for(const m of matches){
    const row=el("div","cat-row"+(viewed.has(m.poem.id)?" viewed":""));
    row.appendChild(el("span","rt",m.poem.title));
    row.appendChild(el("span","ra",m.poem.author));
    row.appendChild(el("span","rl",m.line||""));
    if(viewed.has(m.poem.id)) row.appendChild(el("span","rv","✓"));
    row.onclick=()=>{ location.hash="poem/"+encodeURIComponent(m.poem.id); };
    list.appendChild(row);
  }
  resultsWrap.appendChild(list);
}

/* ---- rhetoric (修辞手法) view ----
   Unlike themes (poem-level tags), rhetoric devices are tagged per line, so
   each device lists the specific poems + sentences that carry it, not whole
   poems. List-only (no full-text compare grid — the point here is the exact
   sentence, which the list already shows). */
function linesForDevice(key){
  const out=[];
  for(const id of ORDER){
    const p=BYID[id];
    const matched=(p.lines||[]).filter(ln=>ln.rhetoric && ln.rhetoric.indexOf(key)>=0);
    if(matched.length) out.push({poem:p, lines:matched});
  }
  return out;
}

function renderRhetoricView(target){
  target=target||root;
  const wrap=el("div","themes");
  for(const dev of RHETORIC){
    const items=linesForDevice(dev.key);
    const block=el("div","cat-block");
    const head=el("div","cat-head");
    const top=el("div","cat-top");
    const chev=el("span","chev",expandedRhet.has(dev.key)?"▾":"▸");
    top.appendChild(chev);
    const lab=el("span","clabel"); lab.innerHTML=dev.zh+' <span class="cen">'+(dev.en||"")+'</span>';
    top.appendChild(lab);
    top.appendChild(el("span","ccount",String(items.length)));
    head.appendChild(top);
    if(dev.desc_zh) head.appendChild(el("div","cdesc",dev.desc_zh));
    const example=el("div","cexample");
    if(dev.examples&&dev.examples.length) example.innerHTML=dev.examples.map(ex=>'例：'+(ex.zh||"")+(ex.en?' <span class="exen">'+ex.en+"</span>":"")).join("<br>");
    example.style.display=expandedRhet.has(dev.key)?"none":"";
    head.appendChild(example);
    const body=el("div","cat-body");
    head.onclick=()=>{
      if(expandedRhet.has(dev.key)) expandedRhet.delete(dev.key); else expandedRhet.add(dev.key);
      const open=expandedRhet.has(dev.key);
      chev.textContent=open?"▾":"▸";
      example.style.display=open?"none":"";
      renderRhetBody(dev,items,body);
    };
    block.appendChild(head); block.appendChild(body);
    renderRhetBody(dev,items,body);
    wrap.appendChild(block);
  }
  target.appendChild(wrap);
}

function renderRhetBody(dev,items,body){
  const open=expandedRhet.has(dev.key);
  body.className="cat-body"+(open?" open":"");
  body.innerHTML="";
  if(!open) return;
  const list=el("div","cat-list");
  for(const {poem,lines} of items){
    const row=el("div","cat-row"+(viewed.has(poem.id)?" viewed":""));
    row.appendChild(el("span","rt",poem.title));
    row.appendChild(el("span","ra",poem.author));
    row.appendChild(el("span","rl",lines.map(l=>l.text).join("／")));
    if(viewed.has(poem.id)) row.appendChild(el("span","rv","✓"));
    row.onclick=()=>{ location.hash="poem/"+encodeURIComponent(poem.id); };
    list.appendChild(row);
  }
  body.appendChild(list);
}

/* ============================ poem view ============================ */
function renderPoem(id){
  const poem=BYID[id];
  if(!poem){ location.hash=""; return; }
  stopAudio();
  document.title=poem.title+" · "+poem.author;
  root.innerHTML="";

  /* toolbar */
  const tb=el("div","toolbar");
  const back=el("button","btn"); back.innerHTML="← 返回目录"; back.onclick=()=>{location.hash="";};
  tb.appendChild(back);
  tb.appendChild(el("span","spacer"));
  const readBtn=el("button","btn"+(viewed.has(id)?" on":""));
  readBtn.textContent=viewed.has(id)?"✓ 已读":"标记已读";
  readBtn.onclick=()=>{
    if(viewed.has(id)) viewed.delete(id); else viewed.add(id);
    saveViewed();
    const on=viewed.has(id);
    readBtn.classList.toggle("on",on);
    readBtn.textContent=on?"✓ 已读":"标记已读";
  };
  tb.appendChild(readBtn);
  const pyBtn=el("button","btn"+(showPinyin?" on":"")); pyBtn.id="pyBtn";
  pyBtn.innerHTML=showPinyin?"✓ 拼音 (空格)":"拼音 (空格)";
  pyBtn.onclick=()=>togglePinyin();
  tb.appendChild(pyBtn);
  root.appendChild(tb);

  const card=el("div","poem-card");
  card.appendChild(el("div","ptitle",poem.title));
  card.appendChild(el("div","ptitle-py",poem.titlePinyin||""));
  card.appendChild(el("div","pauthor",`${poem.dynasty?("〔"+poem.dynasty+"〕 "):""}${poem.author}`));

  /* grade + theme labels */
  {
    const chips=el("div","pcats");
    if(poem.grade){
      const gl=(GRADE_LABEL[poem.grade]||("Grade "+poem.grade))+(poem.volume?("·"+(VOL_LABEL[poem.volume]||poem.volume)):"");
      const gchip=el("button","pchip grade");
      gchip.textContent=gl;
      gchip.title="按年级查看";
      gchip.onclick=()=>{
        indexMode="grades"; try{localStorage.setItem(VIEWMODE_KEY,"grades");}catch(e){}
        location.hash="";
      };
      chips.appendChild(gchip);
    }
    for(const key of (poem.tags||[])){
      const cat=CATEGORIES.find(c=>c.key===key);
      if(!cat) continue;
      const chip=el("button","pchip");
      chip.innerHTML=cat.zh+(cat.en?(' <span class="pchip-en">'+cat.en+'</span>'):"");
      chip.title=cat.desc_zh||"";
      chip.onclick=()=>{
        indexMode="themes"; try{localStorage.setItem(VIEWMODE_KEY,"themes");}catch(e){}
        expandedCats.clear(); expandedCats.add(key);
        location.hash="";
      };
      chips.appendChild(chip);
    }
    if(chips.childElementCount) card.appendChild(chips);
  }

  /* media */
  const media=el("div","media");
  for(const b of mediaButtons(id,false)) media.appendChild(b);
  card.appendChild(media);

  /* poem body */
  const body=el("div","body");
  for(const ln of poem.lines) body.appendChild(buildLine(poem,ln));
  card.appendChild(body);

  const legend=el("div","legend");
  legend.innerHTML='连读变调：<span class="m"><b>橙色</b> 变调（拼音改变）</span><span class="v"><b>蓝色虚线</b> 半上/半去（音值变化）</span>';
  card.appendChild(legend);
  root.appendChild(card);

  /* translations */
  const sT=el("div","section trans");
  sT.appendChild(el("h3","","译文 · Translation"));
  for(const ln of poem.lines){
    const tl=el("div","tl");
    tl.appendChild(el("div","src",ln.text));
    tl.appendChild(el("div","zh",ln.zh||""));
    tl.appendChild(el("div","en",ln.en||""));
    sT.appendChild(tl);
  }
  root.appendChild(sT);

  /* notes */
  const sN=el("div","section");
  sN.appendChild(el("h3","","注释 · Notes"));
  const NL=[["background","背景"],["culture","文化"],["rhetoric","修辞"]];
  for(const [k,lab] of NL){
    const n=poem.notes&&poem.notes[k]; if(!n) continue;
    const box=el("div","note");
    box.appendChild(el("span","lab",lab+"　"));
    box.appendChild(el("div","zh",n.zh||""));
    box.appendChild(el("div","en",n.en||""));
    sN.appendChild(box);
  }
  /* glossary */
  const det=el("details","glossary");
  det.appendChild(el("summary","","字词释义 · Characters ("+poem.chars.length+")"));
  const gg=el("div","gloss-grid");
  for(const c of poem.chars){
    const g=el("div","g");
    g.innerHTML=`<b>${c.char}</b><span class="gp">${c.pinyin}</span>${c.zh}<span class="ge"> ${c.en}</span>`;
    gg.appendChild(g);
  }
  det.appendChild(gg); sN.appendChild(det);
  root.appendChild(sN);

  window.scrollTo(0,0);
  applyPinyinClass();
  if(showPinyin) maybeAutoPlay();
}

function buildLine(poem,ln){
  const sm=sandhiMap(poem,ln.text);
  const sylls=ln.pinyin.trim().split(/\s+/);
  const line=el("div","poem-line");
  let hi=0;
  for(const ch of ln.text){
    if(isHan(ch)){
      const s=sm[hi];
      const c=el("span","char");
      const py=el("span","py");
      if(s){
        py.textContent = s.markChange ? s.read : stripPy(sylls[hi]||"");
        py.classList.add(s.markChange?"s-mark":"s-value");
        c.setAttribute("data-tip",sandhiTip(s));
      }else{
        py.textContent=stripPy(sylls[hi]||"");
        const mm=charMeaning(poem,ch); if(mm) c.setAttribute("data-tip",mm);
      }
      c.appendChild(py);
      c.appendChild(el("span","hz",ch));
      line.appendChild(c);
      hi++;
    }else{
      line.appendChild(el("span","punct",ch));
    }
  }
  if(!(ln.rhetoric && ln.rhetoric.length)) return line;
  const wrap=el("div","line-wrap");
  const inner=el("div","line-inner");
  inner.appendChild(line);
  const badges=el("div","rbadges");
  for(const k of ln.rhetoric){
    const d=deviceByKey(k);
    const badge=el("span","rbadge",d?d.zh:k);
    badge.setAttribute("data-tip",deviceTip(k));
    badges.appendChild(badge);
  }
  inner.appendChild(badges);
  wrap.appendChild(inner);
  return wrap;
}

/* ============================ pinyin + audio ============================ */
function applyPinyinClass(){ document.body.classList.toggle("pinyin",showPinyin); }
function togglePinyin(){
  showPinyin=!showPinyin;
  localStorage.setItem(PREF_KEY,showPinyin?"1":"0");
  applyPinyinClass();
  const b=document.getElementById("pyBtn");
  if(b){ b.classList.toggle("on",showPinyin); b.innerHTML=showPinyin?"✓ 拼音 (空格)":"拼音 (空格)"; }
  if(showPinyin) maybeAutoPlay(); else stopAudio();
}
function maybeAutoPlay(){
  const id=currentPoemId(); if(!id) return; const m=MEDIA[id];
  if(m&&m.audio) playAudio(id);
  else if(TTS) speakPoem(id,false);
}
function mediaStartSeconds(value, fallback){
  const n=Number(value);
  return Number.isFinite(n) && n>=0 ? n : fallback;
}
function playAudio(id){
  const m=MEDIA[id]; if(!m||!m.audio) return;
  try{
    stopMedia({keepAudio:true});
    const start=mediaStartSeconds(m.audioStart,0);
    activeAudioId=id;
    const isNewSource=audioEl.getAttribute("data-src")!==m.audio;
    if(isNewSource){
      audioEl.src=m.audio;
      audioEl.setAttribute("data-src",m.audio);
      audioEl.load();
    }
    audioEl.setAttribute("data-start",String(start));
    const skipToStart=()=>{
      try{
        if(Math.abs(audioEl.currentTime-start)>0.25) audioEl.currentTime=start;
      }catch(e){}
    };
    const startPlayback=()=>{
      skipToStart();
      audioEl.play().catch(()=>{ clearAudioState(); });
      setTimeout(skipToStart,80);
    };
    if(audioEl.readyState>=1) startPlayback();
    else audioEl.addEventListener("loadedmetadata",startPlayback,{once:true});
    updateAudioBtns();
  }catch(e){}
}
function stopMedia(opts={}){
  if(!opts.keepAudio) stopAudioOnly();
  if(!opts.keepTts) stopTtsOnly();
  if(!opts.keepVideo) closeVideoModal();
}
function stopAudio(){ stopMedia(); }
function stopAudioOnly(){
  try{
    audioEl.pause();
    const start=Number(audioEl.getAttribute("data-start")||0);
    if(Number.isFinite(start)) audioEl.currentTime=start;
  }catch(e){}
  clearAudioState();
}
function clearAudioState(){ activeAudioId=null; updateAudioBtns(); }
function toggleAudio(id){
  if(activeAudioId===id && !audioEl.paused){ stopAudioOnly(); }
  else playAudio(id);
}
function updateAudioBtns(){ document.querySelectorAll("[data-audio]").forEach(b=>b.classList.toggle("on", b.getAttribute("data-audio")===activeAudioId)); }
audioEl && audioEl.addEventListener("ended",()=>clearAudioState());
audioEl && audioEl.addEventListener("playing",()=>{
  const start=Number(audioEl.getAttribute("data-start")||0);
  try{ if(Number.isFinite(start) && Math.abs(audioEl.currentTime-start)>0.25) audioEl.currentTime=start; }catch(e){}
});

/* ============================ text-to-speech (read-aloud) ============================ */
const TTS = ("speechSynthesis" in window);
let zhVoice=null, ttsId=null;
function pickVoice(){
  if(!TTS) return;
  const vs=speechSynthesis.getVoices()||[];
  zhVoice = vs.find(v=>/^(zh|cmn)/i.test(v.lang)) || vs.find(v=>/chinese|中文|普通话|國語|国语|粤/i.test(v.name)) || null;
}
if(TTS){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speakPoem(id, toggle){
  if(!TTS) return;
  const p=BYID[id]; if(!p) return;
  const wasThis = ttsId===id && (speechSynthesis.speaking||speechSynthesis.pending);
  if(toggle && wasThis){ stopTtsOnly(); return; }
  stopMedia();
  ttsId=id;
  const u=new SpeechSynthesisUtterance(ttsText(p));
  u.lang="zh-CN"; if(zhVoice) u.voice=zhVoice; u.rate=0.50; u.pitch=1;
  u.onend=()=>{ if(ttsId===id){ ttsId=null; updateTtsBtns(); } };
  u.onerror=()=>{ if(ttsId===id){ ttsId=null; updateTtsBtns(); } };
  speechSynthesis.speak(u); updateTtsBtns();
}
function ttsText(poem){
  const meta=[poem.title, poem.dynasty?`${poem.dynasty}代`:"", poem.author].filter(Boolean).join("。 ");
  return `${meta}。 \n\n${poem.lines.map(l=>l.text).join("。 \n")}`;
}
function stopTts(){ stopMedia(); }
function stopTtsOnly(){ if(TTS){ try{speechSynthesis.cancel();}catch(e){} } ttsId=null; updateTtsBtns(); }
function updateTtsBtns(){ document.querySelectorAll("[data-tts]").forEach(b=>b.classList.toggle("on", b.getAttribute("data-tts")===ttsId)); }

/* ============================ video modal ============================ */
function openVideo(id){
  const m=MEDIA[id]; if(!m||!m.video) return;
  stopMedia();
  const url=m.video, start=mediaStartSeconds(m.videoStart,0);
  let inner="", yt=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{6,})/);
  let bb=url.match(/bilibili\.com\/video\/(BV[\w]+)/i);
  if(yt) inner=`<iframe title="YouTube video player" src="${youtubeEmbedUrl(yt[1],start)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
  else if(bb) inner=`<iframe src="https://player.bilibili.com/player.html?bvid=${bb[1]}&autoplay=1&high_quality=1" allowfullscreen scrolling="no"></iframe>`;
  else if(/\.(mp4|webm|ogg|m4v|mov)(\?|$)/i.test(url)) inner=`<video src="${url}#t=${start}" controls autoplay playsinline></video>`;
  else { window.open(url,"_blank","noopener"); return; }
  const modal=el("div","modal");
  modal.innerHTML=`<div class="box"><button class="btn icon-btn x">✕</button><div class="vwrap">${inner}</div><a class="open-ext" href="${url}" target="_blank" rel="noopener">在新标签打开 ↗</a></div>`;
  const close=()=>modal.remove();
  modal.addEventListener("click",e=>{ if(e.target===modal) close(); });
  modal.querySelector(".x").onclick=close;
  document.addEventListener("keydown",function esc(ev){ if(ev.key==="Escape"){close();document.removeEventListener("keydown",esc);} });
  document.body.appendChild(modal);
}

function closeVideoModal(){ document.querySelectorAll(".modal").forEach(m=>m.remove()); }

function youtubeEmbedUrl(videoId,start){
  const params=new URLSearchParams({autoplay:"1",playsinline:"1",rel:"0"});
  if(start>0) params.set("start",String(Math.floor(start)));
  if(location.protocol==="http:" || location.protocol==="https:"){
    params.set("origin",location.origin);
    params.set("widget_referrer",location.href);
  }
  return `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?${params}`;
}

/* ============================ router ============================ */
function currentPoemId(){
  const h=location.hash.replace(/^#/,"");
  if(h.startsWith("poem/")) return decodeURIComponent(h.slice(5));
  return null;
}
function route(){
  const id=currentPoemId();
  if(id) renderPoem(id); else renderIndex();
}
window.addEventListener("hashchange",route);
document.addEventListener("keydown",e=>{
  if(e.code==="Space" || e.key===" "){
    const t=e.target;
    if(t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA")) return;
    if(currentPoemId()){ e.preventDefault(); togglePinyin(); }
  }
});

/* ============================ tooltip (fast, readable) ============================ */
const tipEl=el("div"); tipEl.id="tip"; document.body.appendChild(tipEl);
let tipTimer=null;
function showTip(t){
  const txt=t.getAttribute("data-tip"); if(!txt) return;
  tipEl.textContent=txt; tipEl.style.display="block";
  const r=t.getBoundingClientRect(), b=tipEl.getBoundingClientRect();
  let left=r.left+r.width/2-b.width/2;
  left=Math.max(8,Math.min(left,window.innerWidth-b.width-8));
  let top=r.top-b.height-10; if(top<8) top=r.bottom+10;
  tipEl.style.left=left+"px"; tipEl.style.top=top+"px";
}
function hideTip(){ tipEl.style.display="none"; }
/* Fire-and-forget oEmbed fetch for YouTube video buttons.
   No API key needed — YouTube's public oEmbed endpoint returns title + channel. */
function prefetchYtTip(b,vid){
  if(b.hasAttribute("data-tip-fetched")) return;
  b.setAttribute("data-tip-fetched","1");
  fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${encodeURIComponent(vid)}&format=json`)
    .then(r=>r.ok?r.json():null)
    .then(j=>{
      if(!j) return;
      const tip=`▶ ${j.title}\n${j.author_name}`;
      b.setAttribute("data-tip",tip);
      if(tipEl.style.display!=="none" && tipEl.textContent.startsWith("▶")) showTip(b);
    })
    .catch(()=>{});
}
document.addEventListener("pointerover",e=>{
  const t=e.target.closest&&e.target.closest("[data-tip]"); if(!t) return;
  if(e.relatedTarget&&t.contains(e.relatedTarget)) return;
  const vid=t.getAttribute("data-video-id");
  if(vid) prefetchYtTip(t,vid);
  clearTimeout(tipTimer); tipTimer=setTimeout(()=>showTip(t),80);
});
document.addEventListener("pointerout",e=>{
  const t=e.target.closest&&e.target.closest("[data-tip]"); if(!t) return;
  if(e.relatedTarget&&t.contains(e.relatedTarget)) return;
  clearTimeout(tipTimer); hideTip();
});
document.addEventListener("click",e=>{
  const t=e.target.closest&&e.target.closest("[data-tip]");
  if(t){ clearTimeout(tipTimer); showTip(t); } else hideTip();
});
window.addEventListener("scroll",hideTip,true);
window.addEventListener("hashchange",hideTip);

/* ============================ boot ============================ */
(async function(){
  applyPinyinClass();
  const ok=await loadData();
  if(!ok){ renderImport(); return; }
  route();
})();
